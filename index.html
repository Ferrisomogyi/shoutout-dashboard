function getAccountByEmail(email) {

}

  const statuses = ['replied','opened','sent','opened','clicked','bounced','pending','opened','replied','sent','opened','clicked','sent','opened','pending','replied','opened','sent','bounced','opened','clicked','replied','opened','sent','opened','sent','pending','opened','replied','clicked','opened','sent','opened','clicked','opened','replied','sent','opened','sent','opened','bounced','opened','replied','sent','opened','clicked','opened','sent','replied','opened'];

// ============================================================
// API CLIENT â talks to your Cloudflare Worker
// ============================================================
class InstantlyAPI {
  constructor(workerUrl) {
    this.baseUrl = workerUrl.replace(/\/$/, '');
  }

  async get(path, params = {}) {
    const url = new URL(this.baseUrl + path);
    Object.entries(params).forEach(([k, v]) => {
      if (v !== undefined && v !== null && v !== '') url.searchParams.set(k, v);
    });
    const resp = await fetch(url.toString());
    if (!resp.ok) throw new Error(`API ${resp.status}: ${resp.statusText}`);
    return resp.json();
  }

  async post(path, body) {
    const resp = await fetch(this.baseUrl + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!resp.ok) throw new Error(`API ${resp.status}: ${resp.statusText}`);
    return resp.json();
  }

  async healthCheck() {
    return this.get('/api/health');
  }

  async getCampaigns() {
    return this.get('/api/campaigns');
  }

  async getCampaignSummary(campaignId) {
    return this.get('/api/campaign/summary', { campaign_id: campaignId });
  }

  async getLeads(campaignId, limit = 100, skip = 0) {
    return this.get('/api/leads', { campaign_id: campaignId, limit, skip });
  }

  async getAccounts() {
    return this.get('/api/accounts');
  }

  async sendFollowUp(campaignId, email) {
    return this.post('/api/lead/email', { campaign_id: campaignId, email });
  }
}

// Transform Instantly lead data â our creator model
function transformLead(lead, index, campaignName) {
  const email = lead.email || '';
  const firstName = lead.first_name || lead.firstName || email.split('@')[0] || 'Onbekend';
  const lastName = lead.last_name || lead.lastName || '';
  const fullName = (firstName + ' ' + lastName).trim() || email;

  // Determine sending account from lead's assigned_email or campaign_account
  const sentViaEmail = lead.email_account || lead.assigned_email || lead.from_email || '';
  const sentVia = getAccountByEmail(sentViaEmail);

  // Map Instantly statuses to our status model
  // Instantly statuses: 0=not sent, 1=sent, 2=opened, 3=replied, -1=bounced, -2=unsubscribed
  let status = 'pending';
  const istatus = lead.lead_status || lead.status;
  if (istatus === 3 || istatus === 'Interested' || istatus === 'Meeting Booked' || lead.has_replied) status = 'replied';
  else if (lead.is_unsubscribed) status = 'unsubscribed';
  else if (istatus === -1 || lead.has_bounced) status = 'bounced';
  else if (lead.has_clicked) status = 'clicked';
  else if (istatus === 2 || lead.is_read || lead.has_opened) status = 'opened';
  else if (istatus === 1 || lead.email_sent) status = 'sent';

  // Build sequence from Instantly's step data if available
  const sequence = [];
  const steps = lead.subsequence_events || lead.steps || [];
  if (steps.length > 0) {
    steps.forEach((step, si) => {
      sequence.push({
        step: si + 1,
        label: si === 0 ? 'Eerste email' : `Follow-up ${si}`,
        subject: step.subject || (si === 0 ? 'Verdien aan je bereik' : 'Nog even over Shoutout.vip...'),
        sentAt: step.sent_at || step.timestamp || null,
        openedAt: step.opened_at || null,
        clickedAt: step.clicked_at || null,
        repliedAt: step.replied_at || null,
        bouncedAt: step.bounced_at || null,
      });
    });
  } else {
    // Fallback: build single step from lead-level data
    sequence.push({
      step: 1,
      label: 'Eerste email',
      subject: lead.email_subject || 'Verdien aan je bereik, word VIP op Shoutout.vip',
      sentAt: lead.sent_at || lead.timestamp || null,
      openedAt: lead.opened_at || (lead.is_read ? lead.last_open_at : null) || null,
      clickedAt: lead.clicked_at || null,
      repliedAt: lead.replied_at || (lead.has_replied ? lead.reply_timestamp : null) || null,
      bouncedAt: lead.bounced_at || (lead.has_bounced ? lead.bounce_timestamp : null) || null,
    });
  }

  return {
    id: lead.id || index + 1,
    email,
    firstName,
    fullName,
    handle: lead.handle || lead.custom_handle || ('@' + firstName.toLowerCase()),
    platform: lead.platform || lead.custom_platform || 'Instagram',
    followers: parseInt(lead.followers || lead.custom_followers || '0') || 0,
    country: lead.country || lead.custom_country || 'NL',
    status,
    sentVia,
    campaignId: lead.campaign_id || '',
    campaignName: campaignName || '',
    sequence,
  };
}

  link: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>,
};

// ============================================================
// HELPERS
// ============================================================
const formatNum = n => n >= 1000000 ? (n/1000000).toFixed(1)+'M' : n >= 1000 ? (n/1000).toFixed(n>=10000?0:1)+'K' : n.toString();
const formatDate = iso => { if (!iso) return '-'; const d = new Date(iso); return d.toLocaleDateString('nl-NL',{day:'numeric',month:'short'}) + ' ' + d.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'}); };
const statusLabel = { pending:'Wacht',sent:'Verstuurd',opened:'Geopend',clicked:'Geklikt',replied:'Beantwoord',bounced:'Bounced' };
const statusOrder = { replied:5,clicked:4,opened:3,sent:2,bounced:1,pending:0 };
const statusColors = { sent:'#60a5fa',opened:'#34d399',clicked:'#a78bfa',replied:'#fbbf24',bounced:'#f87171',pending:'#64748b' };

// ============================================================
// UI COMPONENTS (unchanged from v2)
// ============================================================

function Toast({ message, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const colors = { success: '#34d399', error: '#f87171', info: '#60a5fa', warning: '#fbbf24' };
  return (
    <div className="toast fade-in" style={{borderColor: colors[type]}}>
      <div style={{width:8,height:8,borderRadius:'50%',background:colors[type]}}/>
      {message}
    </div>
  );
}

function AccountTag({ account }) {

function SequenceSteps({ sequence }) {
  return (
    <div>
      {sequence.map((step, i) => {
        const isActive = step.sentAt && !step.bouncedAt;
        const stepStatus = step.repliedAt ? 'replied' : step.clickedAt ? 'clicked' : step.openedAt ? 'opened' : step.bouncedAt ? 'bounced' : step.sentAt ? 'sent' : 'pending';
        return (
          <div key={i} className={`step-card ${isActive ? 'active-step' : ''}`}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:24,height:24,borderRadius:'50%',background: step.sentAt ? `${statusColors[stepStatus]}22` : '#334155',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color: step.sentAt ? statusColors[stepStatus] : '#64748b'}}>
                  {step.step}
                </div>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:'#f1f5f9'}}>{step.label}</div>
                  <div style={{fontSize:11,color:'#64748b'}}>{step.subject}</div>
                </div>
              </div>
              <span className={`badge badge-${stepStatus}`}>{statusLabel[stepStatus]}</span>
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:6}}>
              {step.sentAt && <div style={{fontSize:11,color:'#64748b',display:'flex',alignItems:'center',gap:4}}><div style={{width:12,height:12,color:'#60a5fa'}}>{Icons.send}</div>{formatDate(step.sentAt)}</div>}
              {step.openedAt && <div style={{fontSize:11,color:'#64748b',display:'flex',alignItems:'center',gap:4}}><div style={{width:12,height:12,color:'#34d399'}}>{Icons.eye}</div>{formatDate(step.openedAt)}</div>}
              {step.clickedAt && <div style={{fontSize:11,color:'#64748b',display:'flex',alignItems:'center',gap:4}}><div style={{width:12,height:12,color:'#a78bfa'}}>{Icons.click}</div>{formatDate(step.clickedAt)}</div>}
              {step.repliedAt && <div style={{fontSize:11,color:'#fbbf24',fontWeight:600,display:'flex',alignItems:'center',gap:4}}><div style={{width:12,height:12}}>{Icons.reply}</div>{formatDate(step.repliedAt)}</div>}
              {step.bouncedAt && <div style={{fontSize:11,color:'#f87171',fontWeight:600,display:'flex',alignItems:'center',gap:4}}><div style={{width:12,height:12}}>{Icons.bounce}</div>{formatDate(step.bouncedAt)}</div>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

    if (step.openedAt) timeline.push({ type:'opened', date:step.openedAt, label:`${step.label} geopend`, color:'#34d399', step: step.step });
    if (step.clickedAt) timeline.push({ type:'clicked', date:step.clickedAt, label:'Link geklikt', color:'#a78bfa', step: step.step });

  timeline.sort((a,b) => new Date(a.date) - new Date(b.date));

  const canFollowUp = creator.status !== 'pending' && creator.status !== 'bounced' && creator.status !== 'replied' && creator.sequence.length < 3;

        </div>

        {/* Profile */}
        <div style={{background:'#1e293b',borderRadius:12,padding:16,marginBottom:16,border:'1px solid #334155'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div><span style={{fontSize:11,color:'#64748b'}}>Handle</span><div style={{fontSize:14,fontWeight:500}}>{creator.handle}</div></div>
            <div><span style={{fontSize:11,color:'#64748b'}}>Platform</span><div style={{fontSize:14,fontWeight:500}}>{creator.platform}</div></div>
            <div><span style={{fontSize:11,color:'#64748b'}}>Followers</span><div style={{fontSize:14,fontWeight:500}}>{formatNum(creator.followers)}</div></div>
            <div><span style={{fontSize:11,color:'#64748b'}}>Land</span><div style={{fontSize:14,fontWeight:500}}>{creator.country === 'NL' ? 'Nederland' : creator.country === 'BE' ? 'BelgiÃ«' : creator.country}</div></div>
          </div>
        </div>

        {/* Sent via */}

        {/* Sequence steps */}

    </>
  );

    if (search) {
      const q = search.toLowerCase();
      list = list.filter(c => c.fullName.toLowerCase().includes(q) || c.handle.toLowerCase().includes(q) || c.email.toLowerCase().includes(q) || c.platform.toLowerCase().includes(q));
    }
    if (filter !== 'all') {
      if (filter === 'followup') { list = list.filter(c => c.sequence.length > 1); }
      else { list = list.filter(c => c.status === filter); }
    }
    if (accountFilter !== 'all') list = list.filter(c => c.sentVia.id === accountFilter);
    list.sort((a,b) => {
      if (sortBy === 'status') return (statusOrder[b.status]||0) - (statusOrder[a.status]||0);
      if (sortBy === 'name') return a.fullName.localeCompare(b.fullName);
      if (sortBy === 'followers') return b.followers - a.followers;
      if (sortBy === 'email') return a.email.localeCompare(b.email);
      return 0;
    });
    return list;
  }, [creators, search, filter, accountFilter, sortBy]);

  if (loading) return <Loader text="Creators laden vanuit Instantly..."/>;

  return (
    <div style={{padding:'20px 16px 100px'}}>
      <div style={{marginBottom:16}}>
        <h1 style={{fontSize:24,fontWeight:800,color:'#f1f5f9',letterSpacing:'-0.02em'}}>Creators</h1>
        <p style={{fontSize:13,color:'#64748b',marginTop:4}}>{filtered.length} van {creators.length} creators</p>
      </div>

      {/* Search */}
      <div style={{position:'relative',marginBottom:14}}>
        <div style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',width:20,height:20,color:'#64748b'}}>{Icons.search}</div>
        <input className="search-input" placeholder="Zoek op naam, handle, email..." value={search} onChange={e => setSearch(e.target.value)}/>
      </div>

      {/* Status filters */}
      <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:6,marginBottom:6,WebkitOverflowScrolling:'touch'}}>
        {[['all','Alle'],['replied','Beantwoord'],['opened','Geopend'],['clicked','Geklikt'],['sent','Verstuurd'],['followup','Follow-up'],['bounced','Bounced'],['pending','Wacht']].map(([key,label]) => (
          <button key={key} className={`filter-chip ${filter===key?'active':''}`} onClick={() => setFilter(key)}>{label}</button>
        ))}
      </div>

      {/* Account filters */}
      <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:6,marginBottom:6}}>
        <button className={`filter-chip ${accountFilter==='all'?'active':''}`} onClick={() => setAccountFilter('all')} style={{fontSize:11,padding:'4px 10px'}}>Alle accounts</button>
        {ACCOUNTS.map(acc => (
          <button key={acc.id} className={`filter-chip ${accountFilter===acc.id?'active':''}`} onClick={() => setAccountFilter(acc.id)} style={{fontSize:11,padding:'4px 10px',display:'flex',alignItems:'center',gap:4}}>
            <div style={{width:6,height:6,borderRadius:'50%',background:acc.color}}/>
            {acc.label}
          </button>
        ))}
      </div>

      {/* Sort */}
      <div style={{display:'flex',gap:6,marginBottom:14}}>
        {[['status','Status'],['name','Naam'],['email','Email'],['followers','Followers']].map(([key,label]) => (
          <button key={key} className={`filter-chip ${sortBy===key?'active':''}`} onClick={() => setSortBy(key)} style={{fontSize:11,padding:'4px 10px'}}>{label}</button>
        ))}
      </div>

      {/* List */}
      {filtered.map(c => <CreatorRow key={c.id} creator={c} onClick={() => setSelected(c)}/>)}
      {filtered.length === 0 && <div style={{textAlign:'center',color:'#475569',padding:40,fontSize:14}}>Geen creators gevonden</div>}

      {selected && <CreatorDetail creator={selected} onClose={() => setSelected(null)} onFollowUp={onFollowUp}/>}
    </div>
  );
}

function SettingsView({ config, onSave, connectionStatus, onTestConnection }) {
  const [workerUrl, setWorkerUrl] = useState(config.workerUrl || '');
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null);

  const handleTest = async () => {
    setTesting(true);
    setTestResult(null);
    try {
      const api = new InstantlyAPI(workerUrl);
      const resp = await api.healthCheck();
      if (resp.status === 'ok') {
        setTestResult({ ok: true, msg: 'Verbinding gelukt!' });
      } else {
        setTestResult({ ok: false, msg: 'Worker bereikbaar maar geen geldige response' });
      }
    } catch (e) {
      setTestResult({ ok: false, msg: `Fout: ${e.message}` });
    }
    setTesting(false);
  };

  const handleSave = () => {
    onSave({ workerUrl });
    if (onTestConnection) onTestConnection(workerUrl);
  };

  return (
    <div className="fade-in" style={{padding:'20px 16px 100px'}}>
      <div style={{marginBottom:24}}>
        <h1 style={{fontSize:24,fontWeight:800,color:'#f1f5f9',letterSpacing:'-0.02em'}}>Instellingen</h1>
      </div>

      {/* Worker URL config */}
      <div style={{background:'#1e293b',borderRadius:12,padding:20,border:'1px solid #334155',marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
          <div style={{width:18,height:18,color:'#a78bfa'}}>{Icons.cloud}</div>
          <div style={{fontSize:15,fontWeight:600,color:'#f1f5f9'}}>API Worker URL</div>
        </div>
        <p style={{fontSize:12,color:'#64748b',marginBottom:12}}>
          De URL van je Cloudflare Worker die als proxy dient voor de Instantly API.
          Voorbeeld: https://shoutout-outreach-proxy.jouw-naam.workers.dev
        </p>
        <input
          className="api-input"
          placeholder="https://shoutout-outreach-proxy.ferencsomogyi.workers.dev"
          value={workerUrl}
          onChange={e => { setWorkerUrl(e.target.value); setTestResult(null); }}
        />
        <div style={{display:'flex',gap:8,marginTop:12}}>
          <button className="btn-secondary" onClick={handleTest} disabled={testing || !workerUrl} style={{flex:1}}>
            {testing ? 'Testen...' : 'Test verbinding'}
          </button>
          <button className="btn-primary" onClick={handleSave} disabled={!workerUrl} style={{flex:1}}>
            Opslaan & verbinden
          </button>
        </div>
        {testResult && (
          <div style={{marginTop:10,padding:'8px 12px',borderRadius:8,fontSize:12,fontWeight:500,background: testResult.ok ? 'rgba(52,211,153,0.1)' : 'rgba(248,113,113,0.1)',color: testResult.ok ? '#34d399' : '#f87171'}}>
            {testResult.ok ? 'â' : 'â'} {testResult.msg}
          </div>
        )}
      </div>

      {/* Connection status */}
      <div style={{background:'#1e293b',borderRadius:12,padding:20,border:'1px solid #334155',marginBottom:16}}>
        <div style={{fontSize:15,fontWeight:600,color:'#f1f5f9',marginBottom:12}}>Verbindingsstatus</div>
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:'1px solid #334155'}}>
          <div style={{width:8,height:8,borderRadius:'50%',background: connectionStatus === 'connected' ? '#34d399' : connectionStatus === 'error' ? '#f87171' : '#64748b'}}/>
          <div style={{flex:1}}>
            <span style={{fontSize:13,color:'#e2e8f0'}}>Cloudflare Worker</span>
          </div>
          <span style={{fontSize:11,fontWeight:500,color: connectionStatus === 'connected' ? '#34d399' : connectionStatus === 'error' ? '#f87171' : '#64748b'}}>
            {connectionStatus === 'connected' ? 'Verbonden' : connectionStatus === 'error' ? 'Fout' : 'Niet verbonden'}
          </span>
        </div>
      </div>

      {/* Sending accounts */}
      <div style={{background:'#1e293b',borderRadius:12,padding:20,border:'1px solid #334155',marginBottom:16}}>
        <div style={{fontSize:15,fontWeight:600,color:'#f1f5f9',marginBottom:12}}>Sending accounts</div>
        {ACCOUNTS.map(acc => (
          <div key={acc.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:'1px solid #334155'}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:acc.color}}/>
            <div style={{flex:1}}>
              <span style={{fontSize:13,color:'#e2e8f0'}}>{acc.email}</span>
            </div>
            <span style={{fontSize:11,color:'#34d399',fontWeight:500}}>Warmup actief</span>
          </div>
        ))}
      </div>

      {/* About */}
      <div style={{background:'#1e293b',borderRadius:12,padding:20,border:'1px solid #334155'}}>
        <div style={{fontSize:15,fontWeight:600,color:'#f1f5f9',marginBottom:8}}>Over</div>
        <p style={{fontSize:13,color:'#94a3b8',lineHeight:1.6}}>
          Shoutout Creator Dashboard v3.0<br/>
          Met live Instantly API-integratie via Cloudflare Worker.<br/><br/>
          Gebouwd voor de creator outreach campagne van shoutout.vip.
        </p>
      </div>
    </div>
  );
}

// ============================================================
// MAIN APP â data fetching + state management
// ============================================================
function App() {
  const [tab, setTab] = useState('dashboard');
  const [creators, setCreators] = useState(DEMO_CREATORS);
  const [toast, setToast] = useState(null);
  const [confirmModal, setConfirmModal] = useState(null);
  const [loading, setLoading] = useState(false);
  const [isLive, setIsLive] = useState(false);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [connectionStatus, setConnectionStatus] = useState('disconnected');
  const [config, setConfig] = useState({ workerUrl: DEFAULT_WORKER_URL });
  const [campaigns, setCampaigns] = useState([]);
  const apiRef = useRef(null);

  // Fetch all leads from all campaigns
  const fetchAllData = useCallback(async (workerUrl) => {
    const url = workerUrl || config.workerUrl;
    if (!url) return;

    setLoading(true);
    try {
      const api = new InstantlyAPI(url);
      apiRef.current = api;

      // First check health
      await api.healthCheck();
      setConnectionStatus('connected');

      // Get campaigns
      const campaignsData = await api.getCampaigns();
      const campaignList = campaignsData.data || campaignsData || [];
      setCampaigns(campaignList);

      // Fetch leads from all campaigns
      let allCreators = [];
      for (const campaign of campaignList) {
        const cid = campaign.id || campaign.campaign_id;
        if (!cid) continue;

        let skip = 0;
        const batchSize = 100;
        let hasMore = true;

        while (hasMore) {
          try {
            const leadsData = await api.getLeads(cid, batchSize, skip);
            const leads = leadsData.data || leadsData.leads || leadsData || [];
            if (!Array.isArray(leads) || leads.length === 0) {
              hasMore = false;
              break;
            }

            const transformed = leads.map((lead, idx) =>
              transformLead(lead, allCreators.length + idx, campaign.name || campaign.campaign_name || '')
            );
            allCreators = allCreators.concat(transformed);
            skip += batchSize;

            if (leads.length < batchSize) hasMore = false;
          } catch (e) {
            console.warn(`Error fetching leads batch at skip=${skip}:`, e);
            hasMore = false;
          }
        }
      }

      if (allCreators.length > 0) {
        setCreators(allCreators);
        setIsLive(true);
        setLastRefresh(new Date().toISOString());
        setToast({ message: `${allCreators.length} creators geladen vanuit ${campaignList.length} campagne(s)`, type: 'success' });
      } else {
        // No leads yet â campaigns exist but no data
        if (campaignList.length > 0) {
          setToast({ message: `${campaignList.length} campagne(s) gevonden, maar nog geen leads verstuurd`, type: 'info' });
          setIsLive(true);
          setLastRefresh(new Date().toISOString());
        } else {
          setToast({ message: 'Verbonden, maar geen campagnes gevonden. Start een campagne in Instantly.', type: 'warning' });
          setIsLive(true);
          setLastRefresh(new Date().toISOString());
        }
      }

    } catch (e) {
      console.error('Fetch error:', e);
      setConnectionStatus('error');
      setIsLive(false);
      setToast({ message: `Verbinding mislukt: ${e.message}`, type: 'error' });
    }
    setLoading(false);
  }, [config.workerUrl]);

  // Auto-refresh every 5 minutes when live
  useEffect(() => {
    if (!isLive) return;
    const interval = setInterval(() => fetchAllData(), 300000);
    return () => clearInterval(interval);
  }, [isLive, fetchAllData]);

  const handleSaveConfig = useCallback((newConfig) => {
    setConfig(newConfig);
  }, []);

  const handleTestConnection = useCallback((url) => {
    fetchAllData(url);
  }, [fetchAllData]);

  const handleRefresh = useCallback(() => {
    fetchAllData();
  }, [fetchAllData]);

  const handleFollowUp = useCallback((creator) => {
    setConfirmModal({
      title: 'Follow-up versturen?',
      message: `Wil je een follow-up email sturen naar ${creator.fullName}? Dit wordt email ${creator.sequence.length + 1} in de sequence.`,
      creator,
      onConfirm: async () => {
        try {
          if (apiRef.current && creator.campaignId) {
            await apiRef.current.sendFollowUp(creator.campaignId, creator.email);
          }
          // Optimistic update
          const now = new Date().toISOString();
          setCreators(prev => prev.map(c => {
            if (c.id !== creator.id) return c;
            return {
              ...c,
              sequence: [...c.sequence, {
                step: c.sequence.length + 1,
                label: `Follow-up ${c.sequence.length}`,
                subject: 'Nog even over Shoutout.vip...',
                sentAt: now, openedAt: null, clickedAt: null, repliedAt: null, bouncedAt: null,
              }]
            };
          }));
          setConfirmModal(null);
          setToast({ message: `Follow-up verstuurd naar ${creator.fullName}`, type: 'success' });
        } catch (e) {
          setConfirmModal(null);
          setToast({ message: `Fout bij versturen: ${e.message}`, type: 'error' });
        }
      },
    });
  }, []);

  return (
    <div className="main-content">
      {tab === 'dashboard' && <DashboardView creators={creators} isLive={isLive} lastRefresh={lastRefresh} onRefresh={handleRefresh} loading={loading}/>}
      {tab === 'creators' && <CreatorsView creators={creators} onFollowUp={handleFollowUp} loading={loading}/>}
      {tab === 'settings' && <SettingsView config={config} onSave={handleSaveConfig} connectionStatus={connectionStatus} onTestConnection={handleTestConnection}/>}

      <div className="tab-bar">
        {[['dashboard','Dashboard',Icons.dashboard],['creators','Creators',Icons.people],['settings','Instellingen',Icons.settings]].map(([key,label,icon]) => (
          <div key={key} className={`tab-item ${tab===key?'active':''}`} onClick={() => setTab(key)}>
            {icon}
            <span>{label}</span>
          </div>
        ))}
      </div>

      {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)}/>}
      {confirmModal && (
        <ConfirmModal
          title={confirmModal.title}
          message={confirmModal.message}
          creator={confirmModal.creator}
          confirmLabel="Versturen"
          onConfirm={confirmModal.onConfirm}
          onCancel={() => setConfirmModal(null)}
        />
      )}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
